# Routine config — read by the nightly bi-directional sync Routine.
#
# Lives in the seeds repo so it's source-controlled and editable in PRs.
# The Routine fetches this file from `main` at the start of each run.
#
# Direction model (DEC-003, DEC-010):
#   upstream   = project → seeds (backport improvements that emerged in projects)
#   downstream = seeds → project (propagate template changes outward)
#
# Active set comes from the Routine form's repo chip area on claude.ai —
# NOT from an org scan. The first run (2026-05-08) tried to enumerate
# `mobiustripper42/*` via the GitHub API and ate 17 access denials per pass
# because OAuth scope is per-repo. The form is now the single source of
# truth for which repos this Routine can reach. To add a project to the
# active set: open the Routine in /web-setup and add it to the repo chips.
# To remove: remove the chip. No config change needed for either.
#
# Schema-version gating: the Routine still honors `seeds-version` per
# project. If a project's `.claude/seeds-version` doesn't match
# `seeds-version`, that repo is skipped this run and logged to the
# migration backlog issue.

# Repos to never sync, even if the Routine form grants access. Match by
# full `org/repo` path. Seeds itself is here because seeds doesn't sync
# into seeds — and the form has to grant seeds access for the Routine
# to read this very config file, so we exclude it explicitly.
exclude:
  - mobiustripper42/seeds

# A repo joins the active set only if every condition here is true.
# These run AFTER the form has already determined which repos this
# session can access — they're a second filter, not the access gate.
require:
  # Must have `.claude/seeds-version` at the default branch HEAD.
  has_seeds_version: true
  # Must not be archived on GitHub.
  not_archived: true
  # Must have at least one commit on the default branch (excludes brand-new
  # empty repos where there's nothing to diff against yet).
  has_commits_on_default_branch: true

# Which directions to run nightly. Comment one out to disable that direction.
# Both run in the same Routine session; per-direction PRs are opened
# independently per repo (see DEC-010).
directions:
  - upstream
  - downstream

# Per-direction PR title prefixes. The Routine appends ` — <repo> — <date>`.
pr_title_prefix:
  upstream: "auto-sync upstream"
  downstream: "auto-sync downstream"

# Branch name prefixes used when opening PRs. The Routine appends `/<date>`
# (and `/<repo-slug>` for downstream PRs opened in target projects).
branch_prefix:
  upstream: "auto-sync/upstream"
  downstream: "auto-sync/downstream"

